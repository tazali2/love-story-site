<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Story 💕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Scene 1 -->
  <div class="scene active">
    <h1>🏓 Ping Pong</h1>

    <div class="characters">
      <div class="girl">
        <div class="hair wavy"></div>
        <div class="face brown"></div>
        <div class="outfit girl-outfit"></div>
      </div>

      <div class="boy">
        <div class="hair curly"></div>
        <div class="face brown"></div>
        <div class="outfit boy-outfit"></div>
      </div>
    </div>

    <div class="speech left">You're losing 😭</div>
    <div class="speech right">Watch me win 😤</div>

    <div class="pingpong">
      <div class="ball"></div>
    </div>
  </div>

  <!-- Scene 2 -->
  <div class="scene">
    <h1>🃏 UNO</h1>
    <div class="cards">🟥 🟦 🟩 🟨</div>
    <div class="speech center">+4 AGAIN?? 😭</div>
  </div>

  <!-- Scene 3 -->
  <div class="scene">
    <h1>🚗 Car Concerts</h1>
    <div class="music">🎵 🎶 🎵</div>
    <div class="speech center">WE ATE THAT SONG </div>
  </div>

  <!-- Scene 4 -->
  <div class="scene">
    <h1>🎤 Karaoke</h1>
    <div class="mic">🎤</div>
    <div class="speech center">concert vibes</div>
  </div>

  <!-- Scene 5 -->
  <div class="scene">
    <h1>🍽️ Dinner</h1>
    <div class="hearts">❤️ ❤️ ❤️</div>
    <div class="speech center">my favorite person ❤️</div>
  </div>

  <!-- Final popup -->
  <div id="popup" class="hidden">
    <div class="popup-box">
      <h2>💌 Surprise</h2>
      <p>I love doing life with you ,thank you for making all these memories khai ❤️</p>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>

  <button id="nextBtn">Next ➡️</button>

</div>

<script src="script.js"></script>
</body>
</html>
