<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Story 💕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Scene container -->
  <div class="scene active" id="scene0">
    <h1>🏓 Ping Pong</h1>
    <div class="pingpong">
      <div class="paddle left"></div>
      <div class="paddle right"></div>
      <div class="ball"></div>
    </div>
    <p>We get way too competitive 😭</p>
  </div>

  <div class="scene" id="scene1">
    <h1>🃏 UNO</h1>
    <div class="cards">🟥 🟦 🟩 🟨</div>
    <p>+4 is personal 😤</p>
  </div>

  <div class="scene" id="scene2">
    <h1>🚗 Car Concerts</h1>
    <div class="music">🎵 🎶 🎵</div>
    <p>We sing like we’re famous</p>
  </div>

  <div class="scene" id="scene3">
    <h1>🎤 Karaoke</h1>
    <div class="mic">🎤</div>
    <p>Main character energy</p>
  </div>

  <div class="scene" id="scene4">
    <h1>🍽️ Dinner</h1>
    <div class="hearts">❤️ ❤️ ❤️</div>
    <p>My favorite person ❤️</p>
  </div>

  <!-- Final message -->
  <div class="scene" id="scene5">
    <h1>💌</h1>
    <p class="big">I love doing life with you ❤️</p>
  </div>

  <!-- Button -->
  <button id="nextBtn">Next ➡️</button>

</div>

<script src="script.js"></script>
</body>
</html>
